name: swipe
description: A Tinder-like dating app built with Flutter, Firebase, and Cloudinary.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2

  # Google Sign In
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Swipe Cards
  appinio_swiper: ^2.0.0

  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # HTTP / Cloudinary
  http: ^1.2.2
  dio: ^5.7.0

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # UI Utilities
  timeago: ^3.7.0
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  image_cropper: ^8.0.2
  gap: ^3.0.1
  badges: ^3.1.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^19.5.0
  dotted_border: ^2.1.0
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

flutter_native_splash:
  color: "#111118"
  image: "ios/Runner/Assets.xcassets/AppIcon.appiconset/AppIcon~ios-marketing.png"
  android: true
  ios: true
